name: Erdos Catalog Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh Erdos snapshots via ORP CLI
        run: ./scripts/orp erdos sync

      - name: Create refresh pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(data): refresh Erdos catalog snapshots"
          branch: "bot/erdos-catalog-refresh"
          delete-branch: true
          title: "chore(data): refresh Erdos catalog snapshots"
          body: |
            Automated daily refresh of Erdos catalog snapshots generated by:
            `./scripts/orp erdos sync`
          add-paths: |
            packs/erdos-open-problems/data/erdos_problems.all.json
            packs/erdos-open-problems/data/erdos_problems.open.json
            packs/erdos-open-problems/data/erdos_problems.closed.json
            packs/erdos-open-problems/data/erdos_problems.active.json
            packs/erdos-open-problems/data/erdos_open_problems.md
