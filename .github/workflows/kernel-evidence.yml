name: Kernel Evidence

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  kernel-evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python runtime dependency
        run: python3 -m pip install --upgrade pyyaml

      - name: Run ORP test suite
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Verify CLI help surfaces
        run: |
          node bin/orp.js -h >/dev/null
          node bin/orp.js kernel -h >/dev/null
          node bin/orp.js about --json >/dev/null

      - name: Check kernel benchmark thresholds
        run: python3 scripts/orp-kernel-ci-check.py
